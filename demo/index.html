<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iris xml2udl</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1e1e1e;
            color: #d4d4d4;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; padding: 20px;
        }
        .card {
            max-width: 520px; width: 100%;
            background: #252526; border: 1px solid #3c3c3c;
            border-radius: 8px; padding: 40px; text-align: center;
        }
        h1 { font-size: 28px; color: #4ec9b0; margin-bottom: 8px; }
        .sub { font-size: 13px; color: #808080; margin-bottom: 28px; line-height: 1.6; }
        .buttons { display: flex; flex-direction: column; gap: 10px; margin-bottom: 28px; }
        .btn {
            display: block; padding: 12px 20px;
            border-radius: 6px; text-decoration: none; font-size: 15px;
            font-weight: 500; transition: background .2s;
        }
        .btn-primary { background: #0e639c; color: #fff; }
        .btn-primary:hover { background: #1177bb; }
        .btn-secondary { background: #3c3c3c; color: #ccc; }
        .btn-secondary:hover { background: #4a4a4a; }
        .docs { display: flex; gap: 12px; justify-content: center; }
        .docs a {
            color: #808080; font-size: 13px; text-decoration: none;
            padding: 6px 12px; border: 1px solid #3c3c3c; border-radius: 4px;
            transition: all .2s;
        }
        .docs a:hover { color: #4ec9b0; border-color: #4ec9b0; }
        .footer { margin-top: 24px; font-size: 12px; color: #5a5a5a; }
        .footer a { color: #5a5a5a; }

        /* language switch */
        .lang-bar {
            position: absolute; top: 16px; right: 20px;
            display: flex; gap: 4px;
        }
        .lang-bar a {
            font-size: 12px; color: #808080; text-decoration: none;
            padding: 4px 8px; border: 1px solid #3c3c3c; border-radius: 3px;
        }
        .lang-bar a.selected { background: #0e639c; color: #fff; border-color: #0e639c; }
    </style>
</head>
<body>

<div class="lang-bar" id="lang-switch">
    <a href="javascript:void(0)" data-lang="en" onclick="switchLang('en')">EN</a>
    <a href="javascript:void(0)" data-lang="zh" onclick="switchLang('zh')">中文</a>
</div>

<div class="card">
    <h1>iris xml2udl</h1>
    <p class="sub" data-i18n="desc">
        Parse InterSystems IRIS XML exports into UDL with syntax highlighting — in VS Code or right in your browser.
    </p>

    <div class="buttons">
        <a class="btn btn-primary" href="xml2udl.html" data-i18n="launch">🚀 Launch Demo</a>
        <a class="btn btn-secondary" href="https://marketplace.visualstudio.com/items?itemName=ttykx.iris-xml2udl" data-i18n="vscode">Install VS Code Extension</a>
    </div>

    <div class="docs">
        <a href="README.html" data-i18n="readmeEn">📄 README (EN)</a>
        <a href="README.zh-CN.html" data-i18n="readmeZh">📄 说明文档 (中文)</a>
        <a href="https://github.com/CryzeZz/iris-xml2udl" data-i18n="repo">🔗 GitHub</a>
    </div>

    <p class="footer">
        <span data-i18n="footer">Built by</span>
        <a href="https://github.com/CryzeZz">CryzeZz</a>
    </p>
</div>

<script>
(function () {
    var i18n = {
        'zh': {
            desc:    '将 InterSystems IRIS XML 导出文件解析为 UDL 格式，支持语法高亮 — 在 VS Code 或浏览器中直接使用。',
            launch:  '🚀 启动 Demo',
            vscode:  '安装 VS Code 扩展',
            readmeEn:'📄 README (EN)',
            readmeZh:'📄 说明文档 (中文)',
            repo:    '🔗 GitHub',
            footer:  '作者',
        },
        'en': {
            desc:    'Parse InterSystems IRIS XML exports into UDL with syntax highlighting — in VS Code or right in your browser.',
            launch:  '🚀 Launch Demo',
            vscode:  'Install VS Code Extension',
            readmeEn:'📄 README (EN)',
            readmeZh:'📄 说明文档 (中文)',
            repo:    '🔗 GitHub',
            footer:  'by',
        }
    };

    function detectLang() {
        var params = new URLSearchParams(window.location.search);
        var lang = params.get('lang');
        if (lang === 'zh' || lang === 'en') return lang;
        return 'en';
    }

    window._LANG = detectLang();

    function applyI18N() {
        var t = i18n[window._LANG];
        document.documentElement.lang = window._LANG;
        document.querySelectorAll('[data-i18n]').forEach(function (el) {
            var key = el.getAttribute('data-i18n');
            if (t[key]) el.textContent = t[key];
        });
    }

    window.switchLang = function (newLang) {
        var url = new URL(window.location.href);
        url.searchParams.set('lang', newLang);
        window.location.href = url.toString();
    };

    function markLangButton() {
        document.querySelectorAll('#lang-switch a').forEach(function (a) {
            a.classList.toggle('selected', a.getAttribute('data-lang') === window._LANG);
        });
    }

    applyI18N();
    markLangButton();
})();
</script>

</body>
</html>
